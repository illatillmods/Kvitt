services:
  postgres:
    image: postgres:16-alpine
    container_name: kvitt-postgres
    environment:
      POSTGRES_DB: kvitt
      POSTGRES_USER: kvitt
      POSTGRES_PASSWORD: kvitt
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kvitt -d kvitt"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - kvitt_postgres_data:/var/lib/postgresql/data

volumes:
  kvitt_postgres_data: